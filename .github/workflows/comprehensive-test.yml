name: Comprehensive Testing Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *' # Run nightly at 2 AM

jobs:
  test:
    name: Run Test Pyramid
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: nepa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Copy test environment
        run: cp .env.test backend/.env

      - name: Install Dependencies (backend)
        run: npm ci
        working-directory: backend

      - name: Install Dependencies (api-testing)
        run: npm ci
        working-directory: backend/api-testing

      - name: Setup Test Environment
        run: npm run db:setup
        working-directory: backend
        # Start services in background for integration tests
        # npm run start:services:test &
        # sleep 30 # Wait for services to be ready

      - name: 🧪 Run Unit Tests
        run: npm run test:unit
        working-directory: backend/api-testing

      - name: 🔗 Run Integration Tests
        run: npm run test:integration
        working-directory: backend/api-testing
        env:
          USER_SERVICE_URL: http://localhost:3001
          PAYMENT_SERVICE_URL: http://localhost:3002

      - name: 🔒 Run Security Tests
        run: npm run test:security
        working-directory: backend/api-testing

      - name: 📜 Run Contract Tests
        run: npm run test:contract
        working-directory: backend/api-testing

      - name: 📊 Generate Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: backend/api-testing/test-reports/
